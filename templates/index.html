<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>

    <header id="topbar">
        <div id="logo">SMART<span>PARK</span> UCL</div>
        <div id="status-pill">
            <div class="dot"></div>
            sistema ativo — câmera 01
        </div>
        <div id="datetime">
            <span id="data"></span>
            &nbsp;|&nbsp;
            <span id="hora"></span>
        </div>
    </header>

    <div id="maquete-container">
        <img src="/static/img/estacionamento.png" id="estacionamento">
        <canvas id="overlay"></canvas>
    </div>

    <script src="/static/js/main.js"></script>

    <script>
        function atualizarRelogio() {
            const agora = new Date();
            const data = agora.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
            const hora = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data').textContent = data;
            document.getElementById('hora').textContent = hora;
        }
        atualizarRelogio();
        setInterval(atualizarRelogio, 1000);
    </script>

</body>
</html>
